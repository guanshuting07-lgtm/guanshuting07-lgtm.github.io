<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>鍏虫窇濠凤綔灞曢檲绛栧垝甯?路 閾炬帴瑙嗛噹锛屾寔缁垚闀?/title>
<meta name="description" content="鍏虫窇濠凤紝7骞村睍闄堢瓥鍒掔粡楠屻€備笓娉ㄥ唴瀹圭瓥鐣ャ€佺┖闂村彊浜嬨€侀」鐩粺绛逛笌鍥㈤槦绠＄悊銆?>
<style>
/* ============================================================
   DESIGN TOKENS 鈥?Tec-Do 2.0 KV Style
   ============================================================ */
:root{
  --blue-deep:#0d2b55;--blue-mid:#2563eb;--blue-bright:#4d90f0;--blue-sky:#7cb8f8;--blue-pale:#b8d6fa;--blue-wash:#dceafb;
  --white-cool:#f7f9fc;--white-warm:#fafbfd;
  --text:#141518;--text2:#3a3d42;--text3:#7c8088;--line:#e8ebf0;
  --pad:max(24px,5vw);--max:1320px;
  --font:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font);color:var(--text);background:var(--white-cool);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.65}
a{text-decoration:none;color:inherit}img{display:block;max-width:100%}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}ul{list-style:none}

/* ============================================================
   KV BACKGROUND CANVAS 鈥?fixed fullscreen
   ============================================================ */
.kv-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  background:linear-gradient(155deg,#fbfdfe 0%,#f8fafd 20%,#f5f9fc 50%,#eef5fb 100%)}

/* ============================================================
   CENTER ORB 鈥?姘村厜鐜荤拑閫氶€忔皵娉＄悆浣?   鍥涘眰娴佷綋娓愬彉 + 鍐呴儴绮掑瓙缃戠偣 + 鍐呴儴鏃嬭浆鐜?+ 鏌斿拰鍏夋檿
   ============================================================ */
.kv-orb{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);z-index:1;pointer-events:none}
.kv-orb-core{
  width:360px;height:360px;border-radius:50%;position:relative;
  background:
    /* 宸︿笂楂樺厜 */
    radial-gradient(circle at 32% 26%,rgba(255,255,255,.7) 0,transparent 32%),
    /* 涓婇儴澶ч潰绉祬钃濇祦浣?*/
    radial-gradient(ellipse at 56% 38%,rgba(180,214,250,.45) 0,transparent 38%),
    /* 涓儴鍋忓乏浜摑娴佸姩娓楀叆 */
    radial-gradient(ellipse at 36% 52%,rgba(77,144,240,.3) 0,transparent 38%),
    /* 鍙充笅娣辨捣钃濇殫娴?*/
    radial-gradient(ellipse at 58% 64%,rgba(37,99,235,.18) 0,transparent 42%),
    /* 搴曢儴娣¤摑绾圭悊 */
    radial-gradient(ellipse at 45% 72%,rgba(124,184,248,.22) 0,transparent 36%),
    /* 鏁翠綋姘村厜鐜荤拑搴曡啘 */
    radial-gradient(circle,rgba(220,234,251,.4) 30%,rgba(200,224,250,.16) 60%,transparent 100%);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  border:1px solid rgba(180,214,250,.22);
  box-shadow:0 0 120px rgba(37,99,235,.06),inset 0 0 90px rgba(180,214,250,.13);
  animation:orbBreathe 12s ease-in-out infinite;
}
/* 鍐呴儴缁嗗瘑绮掑瓙缃戠偣 */
.kv-orb-core::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background-image:radial-gradient(circle,rgba(37,99,235,.06) 1px,transparent 1px);
  background-size:16px 16px;
  mask-image:radial-gradient(circle,#000 12%,transparent 62%);-webkit-mask-image:radial-gradient(circle,#000 12%,transparent 62%);
}
/* 鍐呴儴鏃嬭浆娴佷綋鐜?*/
.kv-orb-core::after{
  content:'';position:absolute;top:24%;left:16%;width:68%;height:68%;border-radius:50%;
  border:1px solid rgba(180,214,250,.12);
  animation:orbFluid 20s linear infinite;
}
@keyframes orbBreathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.05);opacity:.95}}
@keyframes orbFluid{to{transform:rotate(360deg)}}

/* ============================================================
   DASHED RING around orb 鈥?鏋佺粏铏氱嚎鐜粫閾炬帴鍔ㄧ嚎
   ============================================================ */
.kv-ring-dashed{
  position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;
  width:420px;height:420px;border-radius:50%;
  border:1px dashed rgba(77,144,240,.09);
  animation:ringSpin 90s linear infinite;
}
.kv-ring-solid{
  position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;
  width:490px;height:490px;border-radius:50%;
  border:1px solid rgba(124,184,248,.04);
  animation:ringSpin 70s linear infinite reverse;
}
@keyframes ringSpin{to{transform:rotate(360deg)}}

/* ============================================================
   BOTTOM PILLAR MATRIX 鈥?閿欒惤楂樹綆娓愬彉鏌辩姸鏁板瓧鑲岀悊
   ============================================================ */
.kv-pillars{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:0;pointer-events:none;
  display:flex;align-items:flex-end;gap:3px;width:100%;max-width:1100px;height:42vh;padding:0 24px;
  mask-image:linear-gradient(to top,rgba(0,0,0,.35) 0%,#000 5%,#000 50%,transparent 100%);-webkit-mask-image:linear-gradient(to top,rgba(0,0,0,.35) 0%,#000 5%,#000 50%,transparent 100%)}
.kv-pillar{flex:1;border-radius:2px 2px 0 0;min-width:4px;opacity:.55;
  background:linear-gradient(to top,rgba(37,99,235,.18),rgba(124,184,248,.09),transparent);
  animation:pillarRise 3.5s ease-out forwards}
@keyframes pillarRise{0%{opacity:0;transform:scaleY(0)}100%{opacity:.55;transform:scaleY(1)}}

/* ============================================================
   FLOATING ELEMENTS 鈥?绋€鐤忛浂鏁ｅ崐閫忔槑婕傛诞姘旀场/鏂瑰潡/鍏夌偣
   ============================================================ */
.kv-float{position:fixed;pointer-events:none;z-index:0}
.kv-float.bubble{
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(180,214,250,.25),rgba(124,184,248,.06));
  border:1px solid rgba(124,184,248,.08);
  animation:floatDrift 16s ease-in-out infinite;
}
.kv-float.cube{
  border-radius:3px;
  background:rgba(180,214,250,.08);
  border:1px solid rgba(124,184,248,.05);
  animation:floatDrift 20s ease-in-out infinite;
}
.kv-float.dot{
  border-radius:50%;
  background:rgba(77,144,240,.1);
  animation:floatDrift 14s ease-in-out infinite;
}
@keyframes floatDrift{
  0%,100%{transform:translate(0,0) rotate(0deg)}
  25%{transform:translate(12px,-16px) rotate(4deg)}
  50%{transform:translate(-6px,-28px) rotate(-2deg)}
  75%{transform:translate(-16px,-8px) rotate(1deg)}
}

/* ============================================================
   HEADER
   ============================================================ */
.header{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;
  background:rgba(252,253,254,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,0,0,.03)}
.header-inner{width:100%;max-width:var(--max);margin:0 auto;padding:0 var(--pad);display:flex;align-items:center;justify-content:space-between}
.header-logo{font-weight:800;font-size:.95rem;color:var(--blue-mid);letter-spacing:.04em}
.header-nav{display:flex;gap:2px}
.header-nav a{font-size:.74rem;color:var(--text2);padding:6px 12px;border-radius:6px;font-weight:500;transition:.2s}
.header-nav a:hover{color:var(--blue-mid);background:rgba(37,99,235,.04)}
.header-menu-btn{display:none;flex-direction:column;gap:4px;padding:4px}
.header-menu-btn span{width:18px;height:1.5px;background:var(--text);border-radius:1px}
.header-mobile{display:none}

/* ============================================================
   HERO 鈥?text layer over KV
   ============================================================ */
.hero{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px var(--pad) 80px}
.hero-inner{display:grid;grid-template-columns:1.2fr .8fr;gap:60px;align-items:center;max-width:var(--max);width:100%}
.hero-content{text-align:left;max-width:880px}
.hero-kicker{font-size:.66rem;font-weight:700;letter-spacing:.2em;color:var(--blue-mid);margin-bottom:16px;text-transform:uppercase}
.hero h1{font-size:clamp(2.8rem,5vw,4.5rem);font-weight:800;line-height:1.12;letter-spacing:-.05em;margin-bottom:14px}
.hero h1 em{font-style:normal;
  background:linear-gradient(180deg,var(--blue-bright) 0%,var(--blue-mid) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:.9rem;color:var(--text2);line-height:1.7;margin-bottom:32px;max-width:520px}
.hero-cta{display:inline-flex;align-items:center;gap:6px;padding:12px 26px;border-radius:100px;font-size:.84rem;font-weight:600;transition:.3s;
  background:var(--blue-mid);color:#fff;box-shadow:0 2px 16px rgba(37,99,235,.15)}
.hero-cta:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 6px 24px rgba(37,99,235,.25)}
.hero-photo{position:relative;display:flex;align-items:center;justify-content:center}
.hero-photo-frame{width:300px;height:380px;border-radius:24px;overflow:hidden;position:relative;
  background:linear-gradient(145deg,rgba(255,255,255,.5),rgba(220,234,251,.3));
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  border:1px solid rgba(180,214,250,.2);
  box-shadow:0 8px 40px rgba(37,99,235,.08);}
.hero-photo-frame img{width:100%;height:100%;object-fit:cover;object-position:top center}
.hero-scroll{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;font-size:.66rem;color:var(--text3);letter-spacing:.1em;
  display:flex;flex-direction:column;align-items:center;gap:4px;animation:scrollHint 2.5s ease-in-out infinite}
@keyframes scrollHint{0%,100%{opacity:.4;transform:translateX(-50%) translateY(0)}50%{opacity:.8;transform:translateX(-50%) translateY(5px)}}
@media(max-width:900px){.hero-inner{grid-template-columns:1fr;text-align:center}.hero-content{text-align:center}.hero-desc{margin-left:auto;margin-right:auto}.hero-photo{order:-1}.hero-photo-frame{width:200px;height:260px;margin:0 auto}}

/* ============================================================
   SECTION 鈥?below KV area
   ============================================================ */
.section{position:relative;z-index:10;padding:90px var(--pad)}
.section-inner{max-width:var(--max);margin:0 auto}
.section-label{text-align:center;font-size:.64rem;font-weight:700;letter-spacing:.16em;color:var(--blue-mid);margin-bottom:8px;text-transform:uppercase}
.section-title{text-align:center;font-size:clamp(2rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.04em;margin-bottom:10px;line-height:1.2}
.section-desc{text-align:center;font-size:.88rem;color:var(--text2);max-width:540px;margin:0 auto 52px;line-height:1.7}

/* ============================================================
   ABOUT 鈥?dynamic process flow
   ============================================================ */
.about-wrap{max-width:1100px;margin:0 auto}
.about-text{font-size:.88rem;color:var(--text2);line-height:1.9;max-width:700px;margin:0 auto 40px;text-align:center}
.about-text p{margin-bottom:12px}
.about-text strong{color:var(--text);font-weight:600}

/* Process flow 鈥?horizontal chain with animated connectors */
.process-flow{display:flex;align-items:center;justify-content:center;gap:0;max-width:1050px;margin:0 auto;flex-wrap:wrap}
.process-node{position:relative;text-align:center;padding:0 8px}
.process-dot{width:58px;height:58px;border-radius:50%;margin:0 auto 10px;position:relative;
  background:rgba(255,255,255,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1.5px solid rgba(37,99,235,.12);
  display:flex;align-items:center;justify-content:center;
  transition:all .4s cubic-bezier(.22,1,.36,1)}
.process-node:hover .process-dot{transform:scale(1.08);border-color:rgba(37,99,235,.25);box-shadow:0 4px 20px rgba(37,99,235,.08)}
.process-dot-inner{font-size:1.2rem;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,var(--blue-mid),var(--blue-bright));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.process-node h4{font-size:.84rem;font-weight:700;color:var(--text);margin-bottom:3px}
.process-node p{font-size:.7rem;color:var(--text3);line-height:1.4;max-width:120px}

/* Animated connector line between nodes */
.process-connector{display:flex;align-items:center;padding:0;position:relative;height:58px;margin-top:-30px}
.process-connector-line{width:50px;height:1.5px;background:var(--line);position:relative}
.process-connector-line::after{content:'';position:absolute;right:-3px;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;background:rgba(37,99,235,.2)}
.process-connector-dot{width:4px;height:4px;border-radius:50%;background:rgba(37,99,235,.15);animation:connectorPulse 2s ease-in-out infinite}
.process-connector-dot:nth-child(2){animation-delay:.4s}
.process-connector-dot:nth-child(3){animation-delay:.8s}
@keyframes connectorPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.6)}}

.skill-row{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:40px}
.skill-pill{padding:7px 14px;font-size:.74rem;font-weight:500;border-radius:100px;
  color:var(--blue-mid);background:rgba(37,99,235,.03);border:1px solid rgba(37,99,235,.06);transition:.2s}
.skill-pill:hover{background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.14)}

@media(max-width:640px){
  .process-flow{gap:12px 0}
  .process-connector{display:none}
  .process-dot{width:46px;height:46px}
  .process-node h4{font-size:.76rem}
}

/* ============================================================
   WORK
   ============================================================ */
.work-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:var(--max);margin:0 auto}
.work-card{background:rgba(255,255,255,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(0,0,0,.04);border-radius:14px;overflow:hidden;cursor:pointer;transition:.35s}
.work-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,.05);border-color:rgba(37,99,235,.08)}
.work-card-img{width:100%;height:170px;object-fit:cover;background:linear-gradient(135deg,#edf2fa,#e0eaf6)}
.work-card-body{padding:16px}
.work-card-tag{display:inline-block;font-size:.58rem;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:100px;margin-bottom:6px;
  background:rgba(37,99,235,.04);color:var(--blue-mid)}
.work-card h3{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:2px}
.work-card p{font-size:.7rem;color:var(--text3);line-height:1.3}

/* ============================================================
   DOCUMENTS
   ============================================================ */
.doc-list{max-width:1000px;margin:0 auto;border-top:1px solid var(--line)}
.doc-row{display:grid;grid-template-columns:44px 1.4fr 1fr auto;align-items:center;gap:18px;padding:20px 0;border-bottom:1px solid var(--line);
  transition:color .2s,padding .2s;cursor:pointer}
.doc-row:hover{color:var(--blue-mid);padding-left:6px}
.doc-num{font-size:.72rem;font-weight:700;color:var(--blue-mid)}
.doc-row strong{font-size:.95rem;font-weight:700;letter-spacing:-.02em}
.doc-row>span{font-size:.72rem;color:var(--text3)}
.doc-row i{font-size:.72rem;font-style:normal;color:var(--blue-mid)}

/* ============================================================
   STATEMENT
   ============================================================ */
.statement{position:relative;z-index:10;margin-top:60px;padding:80px var(--pad);text-align:center;overflow:hidden;
  background:linear-gradient(160deg,var(--blue-deep),#1a3a60);color:#fff}
.statement::before{content:'';position:absolute;width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,184,248,.1),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%)}
.statement-inner{position:relative;z-index:2;max-width:760px;margin:0 auto}
.statement-inner span{display:inline-block;padding:6px 12px;font-size:.62rem;letter-spacing:.1em;font-weight:600;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:100px;margin-bottom:18px}
.statement h2{font-size:clamp(1.6rem,3vw,2.2rem);line-height:1.35;letter-spacing:-.03em;font-weight:800;margin:0}

/* ============================================================
   EXPERIENCE
   ============================================================ */
.exp-wrap{display:grid;grid-template-columns:.85fr 1.15fr;gap:56px;max-width:1160px;margin:0 auto;align-items:start}
.exp-intro h2{font-size:clamp(1.7rem,2.8vw,2.2rem);line-height:1.2;letter-spacing:-.03em;margin:0 0 10px}
.exp-intro h2 em{font-style:normal;color:var(--blue-mid)}
.exp-intro>p{color:var(--text2);font-size:.84rem;line-height:1.7}
.timeline-row{display:grid;grid-template-columns:80px 1fr auto;gap:14px;padding:16px 0;border-top:1px solid var(--line)}
.timeline-row time{font-size:.66rem;font-weight:700;color:var(--blue-mid);letter-spacing:.02em}
.timeline-row h3{font-size:.95rem;font-weight:700;margin-bottom:2px}
.timeline-row p,.timeline-row>span{margin:0;font-size:.68rem;color:var(--text3)}
.timeline-detail{grid-column:2;font-size:.72rem;color:var(--text2);line-height:1.55;margin-top:6px;padding-left:0}
.timeline-detail li{padding:2px 0;position:relative;padding-left:12px}
.timeline-detail li::before{content:'鈥?;position:absolute;left:0;top:2px;color:rgba(37,99,235,.3);font-size:.6rem}
.bar-block{margin-top:64px;display:grid;grid-template-columns:repeat(3,1fr) 1.2fr;align-items:center;max-width:1160px;margin-left:auto;margin-right:auto;
  background:linear-gradient(135deg,var(--blue-deep),#152c4a);color:#fff;border-radius:14px;overflow:hidden}
.bar-cell{padding:32px 20px;border-right:1px solid rgba(255,255,255,.05);text-align:center}
.bar-cell strong{display:block;font-size:2.6rem;font-weight:800;letter-spacing:-.06em;line-height:1;
  background:linear-gradient(180deg,#a8cdfa,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bar-cell span{display:block;font-size:.66rem;color:rgba(255,255,255,.35);margin-top:6px}
.bar-imgs{position:relative;min-height:190px;overflow:hidden}
.bar-imgs a{position:absolute;width:100px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:2px;transition:.3s}
.bar-imgs a:hover{transform:scale(1.04);border-color:rgba(255,255,255,.12);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.bar-imgs img{width:100%;aspect-ratio:.72;object-fit:cover;object-position:top;border-radius:4px}
.bar-imgs a:nth-child(1){left:10%;top:14px;transform:rotate(-3deg)}
.bar-imgs a:nth-child(1):hover{transform:rotate(-3deg) scale(1.04)}
.bar-imgs a:nth-child(2){right:8%;top:42px;transform:rotate(4deg)}
.bar-imgs a:nth-child(2):hover{transform:rotate(4deg) scale(1.04)}

/* ============================================================
   CONTACT
   ============================================================ */
.contact-end{position:relative;z-index:10;padding:80px var(--pad);text-align:center;overflow:hidden;
  background:linear-gradient(160deg,#0a121e,#101e34);color:#fff}
.contact-end::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,.05),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%)}
.contact-inner{position:relative;z-index:2;max-width:660px;margin:0 auto}
.contact-inner p{font-size:.66rem;letter-spacing:.14em;color:var(--blue-sky);margin-bottom:10px}
.contact-inner h2{font-size:clamp(1.8rem,3.5vw,2.6rem);line-height:1.2;letter-spacing:-.03em;margin-bottom:26px}
.contact-inner h2 em{font-style:normal;background:linear-gradient(180deg,#a8cdfa,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.contact-inner>a{display:inline-block;padding:12px 26px;font-size:.82rem;font-weight:600;border-radius:100px;
  background:linear-gradient(135deg,var(--blue-mid),var(--blue-bright));color:#fff;transition:.3s;box-shadow:0 3px 16px rgba(37,99,235,.15)}
.contact-inner>a:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(37,99,235,.28)}
.contact-info{display:flex;justify-content:center;gap:36px;margin-top:42px;position:relative;z-index:2;color:rgba(255,255,255,.28);font-size:.68rem}
.footer{position:relative;z-index:10;text-align:center;padding:20px var(--pad);color:rgba(0,0,0,.18);font-size:.66rem;background:var(--white-cool);border-top:1px solid rgba(0,0,0,.02)}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(8,12,20,.55);backdrop-filter:blur(5px);align-items:center;justify-content:center}
.modal-overlay.on{display:flex}
